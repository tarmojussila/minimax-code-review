name: "MiniMax Code Review"
description: "AI-powered code review using MiniMax models"
inputs:
  MINIMAX_API_KEY:
    description: "MiniMax API key"
    required: true
  MINIMAX_MODEL:
    description: "MiniMax AI model"
    required: false
    default: "MiniMax-M2.5"
  MINIMAX_SYSTEM_PROMPT:
    description: "Custom system prompt for the AI reviewer"
    required: false
    default: "You are an expert code reviewer. Review the provided code changes and give clear, actionable feedback."
  MINIMAX_REVIEWER_NAME:
    description: "Name shown in the review comment header"
    required: false
    default: "MiniMax Code Review"
  EXCLUDE_PATTERNS:
    description: "Comma-separated file patterns to exclude from review (e.g. '*.lock,dist/**,*.min.js')"
    required: false
    default: "*.lock,package-lock.json,yarn.lock,pnpm-lock.yaml"
  MAX_DIFF_CHARS:
    description: "Maximum total characters for the diff sent to the API (0 = unlimited)"
    required: false
    default: "0"
  GITHUB_TOKEN:
    description: "GitHub token for API access"
    required: false
    default: ${{ github.token }}
runs:
  using: "node20"
  main: "dist/index.js"
branding:
  icon: "check-circle"
  color: "purple"